<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interface Chat IA</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: sans-serif;
        }

        body {
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            padding: 20px;
        }

        /* Painel azul claro */
        .chat-container {
            background-color: #f0faff;
            border-radius: 40px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            margin-bottom: 20px;
            min-height: 250px;
        }

        .message {
            margin-bottom: 30px;
            font-size: 1.1rem;
            line-height: 1.5;
            color: #000;
        }

        .user-msg {
            text-align: right;
            margin-left: auto;
            max-width: 80%;
        }

        .ai-msg {
            text-align: left;
            margin-right: auto;
            max-width: 90%;
        }

        /* Aviso da IA */
        .warning-text {
            font-size: 0.75rem;
            color: #333;
            margin-bottom: 15px;
            text-align: center;
        }

        /* Barra de pesquisa funcional */
        .search-container {
            width: 100%;
            max-width: 450px;
        }

        .search-bar {
            width: 100%;
            padding: 15px 25px;
            border: 4px solid #000000;
            border-radius: 50px;
            font-size: 1.2rem;
            outline: none;
        }

        .search-bar::placeholder {
            color: #ccc;
        }

    </style>
</head>
<body>

    <div class="chat-container">
        <div class="message user-msg">
            Gastei 200 reais, e ganhei 100 reais. Minha empresa teve lucro?
        </div>
        <div class="message ai-msg">
            Não. A sua empresa teve um prejuízo de $100,00.
        </div>
    </div>

    <p class="warning-text">A IA está em desenvolvimento, por tanto pode cometer erros</p>

    <form class="search-container" onsubmit="handleSearch(event)">
        <input type="text" class="search-bar" placeholder="Pergunte" id="userInput">
    </form>

    <script>
        function handleSearch(event) {
            event.preventDefault();
            const input = document.getElementById('userInput');
            if(input.value.trim() !== "") {
                alert("Você perguntou: " + input.value);
                input.value = ""; 
            }
        }
    </script>

</body>
</html>
